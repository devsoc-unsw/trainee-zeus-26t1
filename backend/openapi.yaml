openapi: 3.0.3
info:
  title: Code Telephone — Zeus backend
  version: 0.1.0
  description: |
    HTTP surface for health checks plus real-time game play over WebSockets.

    **WebSocket (`GET` upgrade to `/ws/game`)** — Messages are JSON objects with
    shape `{ "event": "<name>", "data": { ... } }` (`data` may be an empty object).

    **Client → server events:** `room:create`, `room:join`, `room:leave`, `game:start`,
    `round:submit`, `game:sync`, `game:reset`.

    **Server → client events:** `room:created`, `room:joined`, `room:updated`, `room:error`,
    `game:started`, `round:begin`, `round:player_submitted`, `round:ended`, `game:reveal`,
    `game:over`, `game:state`.

    See `x-websocket` for path and envelope details.
servers:
  - url: http://localhost:8000
    description: Local development (placeholder)
tags:
  - name: Health
    description: Liveness and readiness style checks
paths:
  /health:
    get:
      tags:
        - Health
      summary: Service health
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    description: Short status token
              example:
                status: ok
x-websocket:
  description: |
    WebSocket endpoint for the Code Telephone game hub. Connect with a WebSocket
    client to `/ws/game` (HTTP upgrade). Each frame is UTF-8 JSON:
    `{ "event": string, "data": object }`.
  path: /ws/game
  envelope:
    event:
      type: string
    data:
      type: object
  clientEvents:
    - room:create
    - room:join
    - room:leave
    - game:start
    - round:submit
    - game:sync
    - game:reset
  serverEvents:
    - room:created
    - room:joined
    - room:updated
    - room:error
    - game:started
    - round:begin
    - round:player_submitted
    - round:ended
    - game:reveal
    - game:over
    - game:state

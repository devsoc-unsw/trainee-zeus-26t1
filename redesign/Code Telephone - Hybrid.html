<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Telephone — Hybrid (Win7 × Tahoe)</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="chrome.css" />
  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="screens.css" />
  <link rel="stylesheet" href="app.css" />

  <!-- React + Babel (pinned versions per house style) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<!-- Tweaks panel scaffold (must come before app.jsx, registers helpers) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Component layers — order matters: each script attaches to window
     and the next layer reads from window. -->
<script type="text/babel" src="bliss.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-meta.jsx"></script>
<script type="text/babel" src="screens-game.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>

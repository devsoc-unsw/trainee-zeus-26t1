services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Bind-mount source for hot reload.
      - .:/app
      # Anonymous volumes preserve image-installed deps and dev build
      # output even though the bind above shadows them.
      - /app/node_modules
      - /app/.next
